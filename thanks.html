<!DOCTYPE html>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F5F1; --ivory: #FFFDF8; --beige: #EFE8E1;
  --greige: #DCCFC4; --taupe: #B8A89A; --text: #4A403A;
  --text-s: #7A6E63; --gold: #C9B59A; --brown: #5C4033;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}
a { text-decoration: none; color: inherit; }

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  letter-spacing: .2em;
  color: var(--brown);
  margin-bottom: 60px;
}
.rule {
  width: 32px; height: 1px;
  background: var(--gold); border: none;
  margin: 28px auto;
}
.en {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: .45em;
  color: var(--taupe);
  text-transform: uppercase;
  display: block;
  margin-bottom: 20px;
}
h1 {
  font-family: 'Noto Serif JP', serif;
  font-weight: 500;
  font-size: clamp(1.4rem, 4vw, 2rem);
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 8px;
}
.body {
  font-size: 14px;
  font-weight: 300;
  line-height: 2.4;
  color: var(--text-s);
  max-width: 420px;
  margin: 0 auto 48px;
}
.back {
  font-size: 11px;
  letter-spacing: .25em;
  color: var(--taupe);
  text-transform: uppercase;
  border-bottom: 1px solid var(--greige);
  padding-bottom: 2px;
  transition: color .2s;
}
.back:hover { color: var(--text); }
</style>
</head>
<body>

<a href="./index.html" class="logo">The Partnership Atelier</a>

<div>
  <span class="en">Thank you</span>
  <h1>ご登録ありがとうございます。</h1>

  <p class="body">
    まもなく、最初のLetterをお届けします。<br><br>
    受信ボックスをお確かめください。<br>
    迷惑メールフォルダに入っている場合は、<br>
    そちらもご確認いただけると嬉しいです。<br><br>
    あなたと、ここで繋がれたことを<br>
    嬉しく思っています。
  </p>
